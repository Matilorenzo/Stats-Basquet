<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Básquet Domingos: A vs B</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .stat-card { background-color: #1e293b; border-radius: 12px; padding: 15px; margin-bottom: 12px; border: 1px solid #334155; }
        .btn-action { padding: 8px; border-radius: 8px; font-weight: bold; transition: transform 0.1s; }
        .btn-action:active { transform: scale(0.95); }
        .btn-pts-3 { background-color: #f59e0b; color: #1e293b; }
        .btn-pts-2 { background-color: #10b981; color: #1e293b; }
        .tab-active { border-bottom: 4px solid #3b82f6; color: #3b82f6; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto">

    <div class="flex justify-around items-center bg-slate-900/80 p-4 rounded-2xl mb-6 sticky top-2 z-10 backdrop-blur-md border border-slate-700">
        <div class="text-center">
            <span class="text-xs text-slate-400 font-bold uppercase">Equipo A</span>
            <div id="scoreA" class="text-5xl font-black text-blue-400">0</div>
        </div>
        <div class="text-2xl font-bold text-slate-600">-</div>
        <div class="text-center">
            <span class="text-xs text-slate-400 font-bold uppercase">Equipo B</span>
            <div id="scoreB" class="text-5xl font-black text-red-400">0</div>
        </div>
    </div>

    <div class="flex mb-6 bg-slate-800 rounded-lg p-1">
        <button onclick="switchTeam('A')" id="tabA" class="flex-1 py-2 font-bold tab-active">EQUIPO A</button>
        <button onclick="switchTeam('B')" id="tabB" class="flex-1 py-2 font-bold text-slate-500">EQUIPO B</button>
    </div>

    <div class="flex gap-2 mb-8">
        <input type="text" id="playerName" placeholder="Nombre jugador..." class="flex-1 p-3 rounded-xl bg-slate-800 border border-slate-700 text-white outline-none">
        <button onclick="addPlayer()" class="bg-slate-700 px-4 py-3 rounded-xl font-bold">+</button>
    </div>

    <div id="playersList"></div>

    <div class="flex flex-col gap-4 mt-10 pb-10">
        <button onclick="exportWhatsApp()" class="bg-green-600 p-4 rounded-xl font-bold shadow-lg">Copiar Resumen WhatsApp 📱</button>
        <button onclick="resetAll()" class="text-slate-500 text-xs underline">Borrar todo y empezar partido nuevo</button>
    </div>

    <script>
        let state = JSON.parse(localStorage.getItem('basketData_v3')) || {
            currentTeam: 'A',
            teams: { A: [], B: [] }
        };

        function switchTeam(team) {
            state.currentTeam = team;
            document.getElementById('tabA').className = team === 'A' ? 'flex-1 py-2 font-bold tab-active' : 'flex-1 py-2 font-bold text-slate-500';
            document.getElementById('tabB').className = team === 'B' ? 'flex-1 py-2 font-bold tab-active' : 'flex-1 py-2 font-bold text-slate-500';
            render();
        }

        function render() {
            const list = document.getElementById('playersList');
            list.innerHTML = '';
            
            let totalA = state.teams.A.reduce((sum, p) => sum + p.pts, 0);
            let totalB = state.teams.B.reduce((sum, p) => sum + p.pts, 0);
            document.getElementById('scoreA').innerText = totalA;
            document.getElementById('scoreB').innerText = totalB;

            const currentPlayers = state.teams[state.currentTeam];

            currentPlayers.forEach((p, index) => {
                list.innerHTML += `
                    <div class="stat-card">
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-xl font-bold">${p.name}</span>
                            <span class="text-3xl font-black text-yellow-400">${p.pts} <small class="text-[10px] text-slate-500">pts</small></span>
                        </div>
                        
                        <div class="flex gap-2 mb-4">
                            <button onclick="updateStat(${index}, 'pts', -2)" class="btn-action bg-slate-700 flex-1 text-xs">-2</button>
                            <button onclick="updateStat(${index}, 'pts', 2)" class="btn-action btn-pts-2 flex-[2]">+2</button>
                            <button onclick="updateStat(${index}, 'pts', 3)" class="btn-action btn-pts-3 flex-[2]">+3</button>
                            <button onclick="updateStat(${index}, 'pts', -3)" class="btn-action bg-slate-700 flex-1 text-xs">-3</button>
                        </div>

                        <div class="grid grid-cols-2 gap-2 text-[11px]">
                            ${statRow(index, 'REB', 'Rebotes', p.reb)}
                            ${statRow(index, 'AST', 'Asistencias', p.ast)}
                            ${statRow(index, 'STL', 'Robos', p.stl)}
                            ${statRow(index, 'BLK', 'Tapas', p.blk)}
                        </div>
                        <button onclick="deletePlayer(${index})" class="text-[9px] text-slate-700 mt-3 block uppercase">Borrar</button>
                    </div>
                `;
            });

            localStorage.setItem('basketData_v3', JSON.stringify(state));
        }

        function statRow(idx, key, label, val) {
            const k = key.toLowerCase();
            return `
                <div class="flex items-center justify-between bg-black/20 p-2 rounded-lg border border-slate-700/30">
                    <span class="text-slate-400">${label}: <strong class="text-white">${val}</strong></span>
                    <div class="flex gap-1">
                        <button onclick="updateStat(${idx}, '${k}', 1)" class="bg-slate-700 w-6 h-6 rounded">+</button>
                        <button onclick="updateStat(${idx}, '${k}', -1)" class="bg-slate-800 w-6 h-6 rounded">-</button>
                    </div>
                </div>
            `;
        }

        function addPlayer() {
            const input = document.getElementById('playerName');
            if (!input.value.trim()) return;
            state.teams[state.currentTeam].push({ name: input.value.trim(), pts: 0, reb: 0, ast: 0, stl: 0, blk: 0 });
            input.value = '';
            render();
        }

        function updateStat(idx, stat, val) {
            state.teams[state.currentTeam][idx][stat] = Math.max(0, state.teams[state.currentTeam][idx][stat] + val);
            render();
        }

        function deletePlayer(idx) {
            if(confirm('¿Borrar?')) {
                state.teams[state.currentTeam].splice(idx, 1);
                render();
            }
        }

        function resetAll() {
            if(confirm('¿Reiniciar todo el partido?')) {
                state.teams = { A: [], B: [] };
                render();
            }
        }

        function exportWhatsApp() {
            let totalA = state.teams.A.reduce((sum, p) => sum + p.pts, 0);
            let totalB = state.teams.B.reduce((sum, p) => sum + p.pts, 0);
            
            let text = `🏀 *RESULTADO FINAL* 🏀\n\n`;
            text += `🔵 *EQUIPO A: ${totalA}*\n`;
            state.teams.A.forEach(p => {
                if(p.pts > 0 || p.reb > 0) text += ` - ${p.name}: ${p.pts}pts, ${p.reb}reb, ${p.ast}ast\n`;
            });
            
            text += `\n🔴 *EQUIPO B: ${totalB}*\n`;
            state.teams.B.forEach(p => {
                if(p.pts > 0 || p.reb > 0) text += ` - ${p.name}: ${p.pts}pts, ${p.reb}reb, ${p.ast}ast\n`;
            });

            navigator.clipboard.writeText(text);
            alert('¡Resumen copiado! Pegalo en WhatsApp.');
        }

        render();
    </script>
</body>
</html>
