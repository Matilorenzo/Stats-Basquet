<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Contador Básquet Domingos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d121c; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        /* Tarjeta compacta */
        .player-card { background-color: #171e2e; border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; border: 1px solid #2d3748; }
        
        /* Controles de puntos compactos */
        .pts-btn { display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; border-radius: 6px; height: 32px; transition: opacity 0.1s; }
        .pts-btn:active { opacity: 0.6; }
        .btn-plus-2 { background-color: #0fac70; color: white; }
        .btn-plus-3 { background-color: #df9119; color: #171e2e; }
        .btn-minus { background-color: #475569; color: white; font-size: 11px; }

        /* Controles de stats compactos */
        .stat-control { display: flex; align-items: center; justify-content: space-between; background-color: #0d121c; border-radius: 6px; border: 1px solid #2d3748; padding: 0 4px; height: 32px; }
        .stat-btn { background-color: rgba(255,255,255,0.05); color: white; width: 24px; height: 24px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: bold; }
        .stat-label { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; line-height: 1; margin-top: -2px;}
        .stat-val { font-size: 14px; font-weight: bold; color: white; line-height: 1.2; }

        /* Header de marcador */
        .scoreboard { background: linear-gradient(180deg, #171e2e 0%, rgba(23,30,46,0.5) 100%); padding: 12px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #2d3748; }
        
        /* Input y botón añadir compactos */
        .add-player-row { display: flex; gap: 6px; margin-bottom: 12px; }
        .input-compact { flex: 1; background-color: #171e2e; border: 1px solid #2d3748; border-radius: 8px; padding: 8px 12px; color: white; font-size: 14px; outline: none; }
        .btn-add-compact { background-color: #2d3748; color: white; width: 38px; height: 38px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; border: 1px solid #4a5568; }

        /* Team Tabs */
        .tab-btn { flex: 1; padding: 8px; text-align: center; font-weight: bold; font-size: 13px; color: #718096; }
        .tab-active { color: white; border-bottom: 3px solid #3182ce; }
    </style>
</head>
<body class="p-3 max-w-lg mx-auto pb-20">

    <div class="scoreboard sticky top-0 z-50 backdrop-blur-sm">
        <div class="flex justify-around items-center">
            <div class="text-center">
                <span class="text-[10px] uppercase font-bold text-slate-400">Equipo A</span>
                <div id="scoreA" class="text-4xl font-black text-blue-400">0</div>
            </div>
            <div class="text-xl font-bold text-slate-700">-</div>
            <div class="text-center">
                <span class="text-[10px] uppercase font-bold text-slate-400">Equipo B</span>
                <div id="scoreB" class="text-4xl font-black text-red-400">0</div>
            </div>
        </div>
    </div>

    <div class="flex mb-3 bg-[#171e2e] rounded-lg p-1 border border-[#2d3748]">
        <button onclick="switchTeam('A')" id="tabA" class="tab-btn tab-active">EQUIPO A</button>
        <button onclick="switchTeam('B')" id="tabB" class="tab-btn">EQUIPO B</button>
    </div>

    <div class="add-player-row">
        <input type="text" id="playerName" placeholder="Nombre jugador..." class="input-compact" onkeypress="handleKeyPress(event)">
        <button onclick="addPlayer()" class="btn-add-compact">+</button>
    </div>

    <div id="playersList"></div>

    <div class="fixed bottom-0 left-0 right-0 p-3 bg-[#0d121c]/90 backdrop-blur-sm border-t border-[#2d3748]">
        <div class="flex gap-2 max-w-lg mx-auto">
            <button onclick="exportWhatsApp()" class="flex-1 bg-green-600 pts-btn">Copiar Resumen WhatsApp 📱</button>
            <button onclick="resetAll()" class="bg-slate-700 pts-btn w-16 text-xs px-1">Reiniciar</button>
        </div>
    </div>

    <script>
        let state = JSON.parse(localStorage.getItem('basketData_v4')) || {
            currentTeam: 'A',
            teams: { A: [], B: [] }
        };

        function switchTeam(team) {
            state.currentTeam = team;
            document.getElementById('tabA').className = team === 'A' ? 'tab-btn tab-active' : 'tab-btn';
            document.getElementById('tabB').className = team === 'B' ? 'tab-btn tab-active' : 'tab-btn';
            render();
        }

        function render() {
            const list = document.getElementById('playersList');
            list.innerHTML = '';
            
            let totalA = state.teams.A.reduce((sum, p) => sum + p.pts, 0);
            let totalB = state.teams.B.reduce((sum, p) => sum + p.pts, 0);
            document.getElementById('scoreA').innerText = totalA;
            document.getElementById('scoreB').innerText = totalB;

            const currentPlayers = state.teams[state.currentTeam];

            currentPlayers.forEach((p, index) => {
                list.innerHTML += `
                    <div class="player-card">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-sm font-semibold text-slate-200 capitalize">${p.name}</span>
                            <div class="flex items-end gap-1">
                                <span class="text-2xl font-bold text-yellow-400">${p.pts}</span>
                                <small class="text-[9px] text-slate-500 mb-1">pts</small>
                                <button onclick="deletePlayer(${index})" class="text-[10px] text-slate-700 ml-2">✖</button>
                            </div>
                        </div>
                        
                        <div class="flex gap-1.5 mb-2.5">
                            <button onclick="updateStat(${index}, 'pts', -2)" class="pts-btn btn-minus w-10">-2</button>
                            <button onclick="updateStat(${index}, 'pts', 2)" class="pts-btn btn-plus-2 flex-1">+2</button>
                            <button onclick="updateStat(${index}, 'pts', 3)" class="pts-btn btn-plus-3 flex-1">+3</button>
                            <button onclick="updateStat(${index}, 'pts', -3)" class="pts-btn btn-minus w-10">-3</button>
                        </div>

                        <div class="grid grid-cols-4 gap-1.5">
                            ${statRow(index, 'REB', 'Rebotes', p.reb)}
                            ${statRow(index, 'AST', 'Asistencias', p.ast)}
                            ${statRow(index, 'STL', 'Robos', p.stl)}
                            ${statRow(index, 'BLK', 'Tapas', p.blk)}
                        </div>
                    </div>
                `;
            });

            localStorage.setItem('basketData_v4', JSON.stringify(state));
        }

        function statRow(idx, key, label, val) {
            const k = key.toLowerCase();
            return `
                <div class="stat-control">
                    <button onclick="updateStat(${idx}, '${k}', -1)" class="stat-btn">-</button>
                    <div class="text-center flex-1">
                        <div class="stat-val">${val}</div>
                        <div class="stat-label">${key}</div>
                    </div>
                    <button onclick="updateStat(${idx}, '${k}', 1)" class="stat-btn">+</button>
                </div>
            `;
        }

        function addPlayer() {
            const input = document.getElementById('playerName');
            if (!input.value.trim()) return;
            state.teams[state.currentTeam].push({ name: input.value.trim(), pts: 0, reb: 0, ast: 0, stl: 0, blk: 0 });
            input.value = '';
            render();
            document.getElementById('playerName').focus(); // Mantiene foco para el siguiente
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') addPlayer();
        }

        function updateStat(idx, stat, val) {
            state.teams[state.currentTeam][idx][stat] = Math.max(0, state.teams[state.currentTeam][idx][stat] + val);
            render();
        }

        function deletePlayer(idx) {
            if(confirm('¿Borrar?')) {
                state.teams[state.currentTeam].splice(idx, 1);
                render();
            }
        }

        function resetAll() {
            if(confirm('¿Reiniciar todo el partido?')) {
                state.teams = { A: [], B: [] };
                render();
            }
        }

        function exportWhatsApp() {
            let totalA = state.teams.A.reduce((sum, p) => sum + p.pts, 0);
            let totalB = state.teams.B.reduce((sum, p) => sum + p.pts, 0);
            
            let text = `🏀 *RESULTADO FINAL DOMINGOS* 🏀\n\n`;
            text += `🔵 *EQUIPO A: ${totalA}*\n`;
            state.teams.A.forEach(p => {
                if(p.pts > 0 || p.reb > 0 || p.ast > 0) text += ` - ${p.name}: ${p.pts}pts, ${p.reb}REB, ${p.ast}AST, ${p.stl}STL, ${p.blk}BLK\n`;
            });
            
            text += `\n🔴 *EQUIPO B: ${totalB}*\n`;
            state.teams.B.forEach(p => {
                if(p.pts > 0 || p.reb > 0 || p.ast > 0) text += ` - ${p.name}: ${p.pts}pts, ${p.reb}REB, ${p.ast}AST, ${p.stl}STL, ${p.blk}BLK\n`;
            });

            navigator.clipboard.writeText(text);
            alert('¡Resumen completo copiado! Pegalo en el grupo de WhatsApp.');
        }

        render();
    </script>
</body>
</html>
